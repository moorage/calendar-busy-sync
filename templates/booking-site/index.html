<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>Request time</title>
    <meta name="description" content="Choose a time and send a private request.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Request time">
    <meta property="og:description" content="Choose a time and send a private request.">
    <meta property="og:image" content="assets/app-icon.png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    <meta property="og:image:alt" content="Calendar Busy Sync app icon">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Request time">
    <meta name="twitter:description" content="Choose a time and send a private request.">
    <meta name="twitter:image" content="assets/app-icon.png">
    <link rel="icon" href="assets/app-icon.png">
    <link rel="apple-touch-icon" href="assets/app-icon.png">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <p id="preview-banner" class="preview-banner" hidden>Local preview</p>
    <main class="page-shell">
      <header class="hero">
        <p class="privacy-note" data-copy="privacyNote" hidden></p>
        <h1 data-profile="pageTitle">Request time</h1>
        <p data-profile="pageSubtitle">Choose a time and send a private request.</p>
      </header>

      <section id="appointment-layout" class="appointment-layout" aria-label="Appointment types">
        <div id="appointment-rail" class="appointment-rail">
          <h2 id="appointment-list-heading">Choose a time</h2>
          <div id="appointment-list" class="appointment-list"></div>
        </div>

        <form id="request-form" class="request-panel" hidden>
          <button id="back-to-times" class="back-button" type="button" hidden>&larr; Back</button>
          <h2 id="selected-title">Choose a time</h2>
          <p id="selected-detail" class="muted"></p>

          <section id="time-step" class="time-step" aria-label="Select a date and time">
            <div class="scheduler-grid">
              <section class="calendar-panel" aria-label="Available dates">
                <div class="calendar-header">
                  <button id="previous-month" class="icon-button" type="button" aria-label="Previous month">&lt;</button>
                  <h3 id="calendar-month">Month</h3>
                  <button id="next-month" class="icon-button" type="button" aria-label="Next month">&gt;</button>
                </div>
                <div class="calendar-weekdays" aria-hidden="true">
                  <span>Sun</span>
                  <span>Mon</span>
                  <span>Tue</span>
                  <span>Wed</span>
                  <span>Thu</span>
                  <span>Fri</span>
                  <span>Sat</span>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
                <details class="timezone-control">
                  <summary id="time-zone-summary">Times shown in your time zone</summary>
                  <label class="timezone-label" for="time-zone-select">Time zone</label>
                  <select id="time-zone-select" class="timezone-select"></select>
                </details>
              </section>

              <section class="time-panel" aria-label="Available times">
                <h3 id="selected-date-heading">Select a date</h3>
                <div id="time-list" class="time-list"></div>
              </section>
            </div>
            <input id="slot-select" name="slot" type="hidden" required>
          </section>

          <section id="details-step" class="details-step" hidden>
            <p id="selected-time-summary" class="selected-time-summary"></p>

            <label for="visitor-name">Name</label>
            <input id="visitor-name" name="name" autocomplete="name" required>

            <label for="visitor-email">Email</label>
            <input id="visitor-email" name="email" autocomplete="email" type="email" required>

            <div id="guest-fields" class="guest-fields"></div>
            <button id="add-guest" class="secondary-button" type="button">Add guests</button>

            <label for="visitor-topic">Please share anything that will help prepare for our meeting.</label>
            <textarea id="visitor-topic" name="topic" rows="4"></textarea>

            <button id="submit-request" type="submit">Send request</button>
          </section>
          <p id="form-status" class="form-status" role="status"></p>
        </form>
      </section>
    </main>

    <script src="assets/app.js" type="module"></script>
  </body>
</html>
